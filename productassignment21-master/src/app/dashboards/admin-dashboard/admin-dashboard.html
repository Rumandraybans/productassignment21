<div class="row">
  <div class="col-md-4 mb-4">
    <div class="card p-3 shadow-sm">
      <h5>{{ isEditing ? 'Edit Product Entry' : 'Create New Product' }}</h5>
      <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Product Name</label>
          <input type="text" class="form-control" formControlName="name">
        </div>
        <div class="mb-3">
          <label class="form-label">Price ($)</label>
          <input type="number" class="form-control" formControlName="price">
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea class="form-control" formControlName="description" rows="2"></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label">Stock Units</label>
          <input type="number" class="form-control" formControlName="stock">
        </div>
        <button type="submit" class="btn btn-success w-100">{{ isEditing ? 'Save Changes' : 'Publish Product' }}</button>
        <button type="button" *ngIf="isEditing" class="btn btn-secondary w-100 mt-2" (click)="cancelEdit()">Cancel</button>
      </form>
    </div>
  </div>

  <div class="col-md-8">
    <h4>Inventory Overview Table</h4>
    <table class="table table-striped table-bordered mt-3">
      <thead class="table-dark">
        <tr>
          <th>Title</th>
          <th>Price</th>
          <th>Stock</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let p of products">
          <td>{{ p.name }}</td>
          <td>${{ p.price | number:'1.2-2' }}</td>
          <td>{{ p.stock }} items</td>
          <td>
            <button class="btn btn-warning btn-sm me-2" (click)="editClick(p)">Edit</button>
            <button class="btn btn-danger btn-sm" (click)="deleteProduct(p._id)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
